name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # Emit JUnit XML so the dogfood job (and FlakeTrack itself) can ingest it.
      - run: npm test
        env:
          CI: 'true'
      - run: npm run build
      - run: npm run build:dashboard
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: junit-reports
          path: reports/

  # Dogfood: run FlakeTrack against its own test suite's JUnit output and write
  # the history to this repo's flaketrack-data branch. This is the real-world
  # test the convergence rules demand — FlakeTrack eating its own dogfood.
  dogfood:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: junit-reports
          path: reports
      - name: Run FlakeTrack on its own test output
        # Pin to the released version rather than `uses: ./` so a broken build
        # can't mask its own bugs — the dogfood must run the same code users get.
        uses: cbrown350/flaketrack@3cad8bbe5618f68a24fb3804b49155ee15b12b2e # v0.1.1
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        with:
          junit-paths: 'reports/**/*.xml'
          data-branch: flaketrack-data