name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # SHA-pin before first real release.
      - uses: actions/checkout@<pin-sha>
      - uses: actions/setup-node@<pin-sha>
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run all
      # Build provenance: attests that the dist/ artifact was built from this
      # exact source on this runner. Post-CVE-2025-30066 supply-chain hygiene.
      - uses: actions/attest-build-provenance@<pin-sha>
        with:
          subject-path: dist/index.js
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/index.js \
            --title "$TAG" \
            --generate-notes
